<svg xmlns="http://www.w3.org/2000/svg" width="640" height="420" viewBox="0 0 640 420" fill="none" font-family="Geist, ui-sans-serif, system-ui, sans-serif">
  <rect width="640" height="420" fill="#F9F6F4"/>
  <!-- top bar -->
  <rect x="0" y="0" width="640" height="64" fill="#0A1128"/>
  <circle cx="36" cy="32" r="14" fill="#FCCA07"/>
  <path d="M30 32c0-3.3 2.7-6 6-6s6 2.7 6 6" stroke="#0A1128" stroke-width="2" fill="none" stroke-linecap="round"/>
  <circle cx="36" cy="30" r="2.4" fill="#0A1128"/>
  <text x="60" y="28" fill="#FFFFFF" font-size="14" font-weight="500">AI Voice Agent</text>
  <text x="60" y="46" fill="#9aa3b2" font-size="12">Outbound call to new lead</text>
  <g transform="translate(520,20)">
    <circle cx="8" cy="12" r="5" fill="#34D399"/>
    <text x="20" y="17" fill="#34D399" font-size="12" font-weight="500">Live 00:41</text>
  </g>
  <!-- waveform -->
  <g transform="translate(0,84)" fill="#FCCA07">
    <rect x="40" y="14" width="4" height="12" rx="2"/><rect x="50" y="8" width="4" height="24" rx="2"/><rect x="60" y="2" width="4" height="36" rx="2"/><rect x="70" y="10" width="4" height="20" rx="2"/><rect x="80" y="16" width="4" height="8" rx="2"/><rect x="90" y="6" width="4" height="28" rx="2"/><rect x="100" y="12" width="4" height="16" rx="2"/><rect x="110" y="0" width="4" height="40" rx="2"/><rect x="120" y="10" width="4" height="20" rx="2"/><rect x="130" y="16" width="4" height="8" rx="2"/><rect x="140" y="4" width="4" height="32" rx="2"/><rect x="150" y="12" width="4" height="16" rx="2"/><rect x="160" y="8" width="4" height="24" rx="2"/>
    <g fill="#d9d7d0"><rect x="180" y="14" width="4" height="12" rx="2"/><rect x="190" y="10" width="4" height="20" rx="2"/><rect x="200" y="6" width="4" height="28" rx="2"/><rect x="210" y="14" width="4" height="12" rx="2"/><rect x="220" y="16" width="4" height="8" rx="2"/><rect x="230" y="8" width="4" height="24" rx="2"/><rect x="240" y="12" width="4" height="16" rx="2"/></g>
  </g>
  <!-- transcript -->
  <g transform="translate(40,146)">
    <text x="0" y="0" fill="#8a8a84" font-size="11" letter-spacing="0.5">LIVE TRANSCRIPT</text>
    <!-- AI bubble -->
    <rect x="0" y="14" width="360" height="52" rx="10" fill="#FFFFFF" stroke="#e7e6e4"/>
    <text x="16" y="36" fill="#0A1128" font-size="13">Hi, this is Ava calling from Apex Dental about</text>
    <text x="16" y="54" fill="#0A1128" font-size="13">the appointment you just requested. Have a sec?</text>
    <text x="16" y="80" fill="#b0aea7" font-size="10">AI agent</text>
    <!-- Caller bubble -->
    <rect x="220" y="92" width="340" height="34" rx="10" fill="#0A1128"/>
    <text x="236" y="113" fill="#FFFFFF" font-size="13">Yes, I wanted to book a cleaning this week.</text>
    <text x="236" y="140" fill="#b0aea7" font-size="10">Caller</text>
    <!-- AI bubble 2 -->
    <rect x="0" y="150" width="380" height="34" rx="10" fill="#FFFFFF" stroke="#e7e6e4"/>
    <text x="16" y="171" fill="#0A1128" font-size="13">Great. I have Thursday 2pm or Friday 10am open.</text>
  </g>
  <!-- footer status chips -->
  <g transform="translate(40,352)">
    <rect x="0" y="0" width="150" height="36" rx="8" fill="#FCCA07"/>
    <text x="16" y="23" fill="#0A1128" font-size="12" font-weight="500">Booked Thu 2:00 PM</text>
    <rect x="164" y="0" width="150" height="36" rx="8" fill="#FFFFFF" stroke="#e7e6e4"/>
    <circle cx="182" cy="18" r="5" fill="#34D399"/>
    <text x="196" y="23" fill="#0A1128" font-size="12">Synced to CRM</text>
    <rect x="328" y="0" width="170" height="36" rx="8" fill="#FFFFFF" stroke="#e7e6e4"/>
    <text x="344" y="23" fill="#0A1128" font-size="12">Follow-up scheduled</text>
  </g>
</svg>
