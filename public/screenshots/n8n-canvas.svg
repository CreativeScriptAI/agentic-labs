<svg xmlns="http://www.w3.org/2000/svg" width="640" height="420" viewBox="0 0 640 420" font-family="Geist, ui-sans-serif, system-ui, sans-serif">
  <defs>
    <pattern id="dots" width="22" height="22" patternUnits="userSpaceOnUse"><circle cx="2" cy="2" r="1.3" fill="#e2e0d9"/></pattern>
  </defs>
  <rect width="640" height="420" fill="#FBFAF7"/>
  <rect width="640" height="420" fill="url(#dots)"/>
  <!-- toolbar -->
  <rect x="0" y="0" width="640" height="44" fill="#FFFFFF"/>
  <line x1="0" y1="44" x2="640" y2="44" stroke="#e7e6e4"/>
  <text x="20" y="28" fill="#0A1128" font-size="13" font-weight="500">Content pipeline</text>
  <rect x="150" y="13" width="60" height="18" rx="4" fill="#EAF3DE"/><text x="160" y="26" fill="#3B6D11" font-size="11">Active</text>
  <rect x="548" y="11" width="72" height="22" rx="5" fill="#FCCA07"/><text x="562" y="26" fill="#0A1128" font-size="11" font-weight="500">Execute</text>
  <!-- connectors -->
  <path d="M170 118 C 205 118, 205 118, 236 118" stroke="#c9c7c0" stroke-width="2" fill="none"/>
  <path d="M396 118 C 430 118, 430 210, 236 210 C 205 210, 205 210, 175 210" stroke="#c9c7c0" stroke-width="2" fill="none" stroke-dasharray="0"/>
  <path d="M170 210 C 130 210, 130 300, 300 300 C 330 300, 330 300, 360 300" stroke="#c9c7c0" stroke-width="2" fill="none"/>
  <!-- node: trigger -->
  <g>
    <rect x="40" y="94" width="130" height="48" rx="10" fill="#FFFFFF" stroke="#e7e6e4"/>
    <rect x="40" y="94" width="6" height="48" rx="3" fill="#FCCA07"/>
    <text x="58" y="116" fill="#0A1128" font-size="12" font-weight="500">Schedule</text>
    <text x="58" y="132" fill="#8a8a84" font-size="10">Every 2 hours</text>
  </g>
  <!-- node: fetch news -->
  <g>
    <rect x="236" y="94" width="160" height="48" rx="10" fill="#FFFFFF" stroke="#e7e6e4"/>
    <rect x="236" y="94" width="6" height="48" rx="3" fill="#378ADD"/>
    <text x="254" y="116" fill="#0A1128" font-size="12" font-weight="500">Fetch news (RSS)</text>
    <text x="254" y="132" fill="#8a8a84" font-size="10">20 items in</text>
  </g>
  <!-- node: AI write -->
  <g>
    <rect x="40" y="186" width="130" height="48" rx="10" fill="#FFFFFF" stroke="#e7e6e4"/>
    <rect x="40" y="186" width="6" height="48" rx="3" fill="#7F77DD"/>
    <text x="58" y="208" fill="#0A1128" font-size="12" font-weight="500">AI: write post</text>
    <text x="58" y="224" fill="#8a8a84" font-size="10">GPT / Claude</text>
  </g>
  <!-- node: review -->
  <g>
    <rect x="236" y="186" width="150" height="48" rx="10" fill="#FFFFFF" stroke="#e7e6e4"/>
    <rect x="236" y="186" width="6" height="48" rx="3" fill="#1D9E75"/>
    <text x="254" y="208" fill="#0A1128" font-size="12" font-weight="500">Approve (sheet)</text>
    <text x="254" y="224" fill="#8a8a84" font-size="10">1 checkbox</text>
  </g>
  <!-- node: publish -->
  <g>
    <rect x="360" y="276" width="200" height="52" rx="10" fill="#0A1128"/>
    <text x="378" y="299" fill="#FFFFFF" font-size="12" font-weight="500">Publish everywhere</text>
    <text x="378" y="316" fill="#9aa3b2" font-size="10">FB · IG · LinkedIn · Threads</text>
    <circle cx="540" cy="302" r="9" fill="#34D399"/>
    <path d="M536 302l3 3 5-6" stroke="#0A1128" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <!-- footer -->
  <line x1="0" y1="378" x2="640" y2="378" stroke="#e7e6e4"/>
  <circle cx="24" cy="399" r="5" fill="#34D399"/>
  <text x="38" y="404" fill="#0A1128" font-size="12">Last run succeeded · 4 posts published</text>
</svg>
